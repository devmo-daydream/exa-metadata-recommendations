<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Exa — Title Tag &amp; Meta Description Recommendations · daydream</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --pink:#FFCADF; --lavender:#EED1FF; --lavender-lt:#F7E8FD; --blue-ice:#D0F2FF;
    --mint:#C3F2D0; --peach-warm:#D8AAFF; --off-white:#FFFFFB; --warm-cream:#FFF9F4;
    --near-black:#232323; --text-subtle:#6B6B6B; --border:#E8E2DC;
    --grad:linear-gradient(135deg,#C3F2D0 0%,#B3EAFF 53%,#FEE3CC 100%);
    --grad-h:linear-gradient(90deg,#C3F2D0 0%,#B3EAFF 53%,#FEE3CC 100%);
    --sidebar-w:288px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Raleway',sans-serif;background:var(--warm-cream);color:var(--near-black);min-height:100vh;font-size:15px;-webkit-font-smoothing:antialiased}
  a{color:#7c3aed;text-decoration:none}a:hover{text-decoration:underline}
  h1,h2,h3,h4{margin:0;line-height:1.2}
  .app{display:flex;min-height:100vh}
  .sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--near-black);color:#CFCBC6;position:fixed;top:0;bottom:0;left:0;overflow-y:auto;z-index:30}
  .main{margin-left:var(--sidebar-w);flex:1;min-width:0}

  .sb-brand{padding:24px 22px 18px;border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:0;background:var(--near-black);z-index:2}
  .sb-brand .logo{display:flex;align-items:center;gap:9px;font-weight:700;color:var(--off-white);font-size:15px}
  .sb-brand .logo .dot{width:20px;height:20px;border-radius:6px;background:var(--grad);display:inline-block}
  .sb-brand .sub{color:#8a8a8a;font-size:11.5px;margin-top:7px;font-weight:500;line-height:1.4}
  .sb-brand .sub b{color:var(--mint);font-weight:700}
  .sb-group{padding:16px 12px 0}
  .sb-group-t{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:#7a756f;font-weight:800;padding:0 11px 8px;display:flex;align-items:center;gap:8px}
  .sb-group-t .pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:var(--mint)}
  .sb-group-t.t2 .pdot{background:var(--peach-warm)}
  .sb-group-t.t3 .pdot{background:#8a8a8a}
  .sb-item{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;color:#C7C2BC;cursor:pointer;font-size:13px;font-weight:500;margin-bottom:2px;border:1px solid transparent;line-height:1.3}
  .sb-item:hover{background:rgba(255,255,255,.05);color:var(--off-white);text-decoration:none}
  .sb-item.active{background:var(--lavender);color:#4a1a7a;font-weight:700;border-color:#c49aff}
  .sb-item span:first-child{flex:1;min-width:0}
  .sb-item .pill{margin-left:auto;font-size:9px;font-weight:800;padding:2px 7px;border-radius:999px;letter-spacing:.04em;flex-shrink:0}
  .pill-t1{background:var(--mint);color:#1a5c2a}
  .pill-t2{background:var(--peach-warm);color:#3a1066}
  .pill-t3{background:#3a3a3a;color:#cfcbc6}
  .sb-item.active .pill-t1{background:#9be8ab}
  .sb-item.active .pill-t2{background:#b88aff}
  .sb-item.active .pill-t3{background:#cfcbc6;color:#232323}
  .sb-star{color:var(--peach-warm);font-size:11px;flex-shrink:0}
  .sb-item.active .sb-star{color:#7c3aed}
  .sb-foot{padding:18px 22px 30px;font-size:11px;color:#6f6a64;line-height:1.5}

  .page-header{background:var(--near-black);position:relative;overflow:hidden}
  .page-header-inner{max-width:1180px;margin:0 auto;padding:38px 64px 64px;position:relative;z-index:1}
  .page-header::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:54px;background:var(--warm-cream);clip-path:ellipse(60% 100% at 50% 100%)}
  .ph-top{display:flex;align-items:flex-start;gap:18px}
  .header-eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--mint);margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .header-eyebrow::before{content:'✦';background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .page-title{font-size:clamp(25px,3vw,35px);font-weight:500;color:var(--off-white);line-height:1.14;margin-bottom:16px}
  .page-meta{font-size:13px;font-weight:500;display:flex;gap:22px;flex-wrap:wrap}
  .page-meta span{display:flex;align-items:center;gap:6px;color:#8a8a8a}
  .page-meta span strong{color:var(--off-white);font-weight:600}
  .page-meta .ph-pill{display:inline-block;font-size:10.5px;font-weight:800;padding:2px 9px;border-radius:999px;letter-spacing:.04em;margin-left:4px}
  .ph-pill.t1{background:var(--mint);color:#1a5c2a}
  .ph-pill.t2{background:var(--peach-warm);color:#3a1066}
  .ph-pill.t3{background:#3a3a3a;color:#cfcbc6}
  .ph-pill.kwr{background:var(--blue-ice);color:#155e75}
  .ph-pill.inf{background:var(--lavender-lt);color:#4a1a7a}

  .tabbar{max-width:1180px;margin:0 auto;padding:6px 64px 0;display:flex;gap:6px}
  .tab{font-family:'Raleway';font-size:13.5px;font-weight:700;color:var(--text-subtle);padding:11px 22px;border-radius:12px 12px 0 0;cursor:pointer;background:transparent;border:1px solid transparent;border-bottom:none}
  .tab:hover{color:var(--near-black)}
  .tab.active{color:var(--near-black);background:var(--off-white);border-color:var(--border)}
  .tab .tcount{margin-left:7px;font-size:11px;font-weight:800;background:var(--lavender);color:#4a1a7a;padding:1px 8px;border-radius:999px}
  .panel{display:none}.panel.active{display:block}
  .main-pad{max-width:1180px;margin:0 auto;padding:28px clamp(24px,5vw,64px) 120px}

  /* meta card */
  .meta-card{background:var(--off-white);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:22px}
  .meta-card-header{background:var(--near-black);padding:13px 24px;display:flex;align-items:center;gap:10px}
  .meta-card-header span{font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--mint)}
  .meta-card-header .mch-sub{margin-left:auto;font-size:11px;color:#8a8a8a;letter-spacing:0;text-transform:none;font-weight:500}
  .meta-table{width:100%;border-collapse:collapse;font-size:13px}
  .meta-table tr{border-bottom:1px solid var(--border)}.meta-table tr:last-child{border-bottom:none}
  .meta-table td{padding:12px 24px;vertical-align:top;line-height:1.55}
  .meta-table td:first-child{font-weight:800;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);width:170px;white-space:nowrap;background:var(--warm-cream)}
  .meta-table .mono{font-family:'JetBrains Mono';font-size:12px;background:var(--warm-cream);padding:2px 7px;border-radius:5px}
  .kbadge{display:inline-block;font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;background:#7c3aed;color:#fff}
  .kbadge.kwr{background:var(--blue-ice);color:#155e75}
  .kbadge.inf{background:var(--lavender-lt);color:#4a1a7a}
  .charcount{color:var(--text-subtle);font-weight:600;font-size:11px;margin-left:8px;font-family:'JetBrains Mono'}
  .charcount.ok{color:#1a5c2a}
  .charcount.warn{color:#9a6313}
  .charcount.bad{color:#a8302e}
  .draft-hint{background:var(--blue-ice);border:1px solid #9fdcf0;border-radius:12px;padding:13px 18px;margin:0 0 22px;font-size:13px;color:#155e75;line-height:1.5}
  .draft-hint b{font-weight:800}
  .opt-label{display:inline-block;font-size:10.5px;font-weight:800;letter-spacing:.05em;padding:2px 8px;border-radius:5px;margin-right:8px;vertical-align:middle}
  .opt-A{background:#34b864;color:#fff}
  .opt-B{background:#7c3aed;color:#fff}
  .opt-cur{background:#9a6313;color:#fff}
  .note-row td{background:#fff8ee;color:#5a4420;font-size:12.5px;line-height:1.55}
  .note-row td:first-child{background:#fff8ee;color:#9a6313}

  /* SERP preview */
  .serp-stage{background:#ECEAE6;border-radius:16px;padding:34px clamp(14px,3vw,40px) 44px;border:1px solid var(--border)}
  .serp-note{max-width:760px;margin:0 auto 22px;font-size:12.5px;color:var(--text-subtle);background:var(--off-white);border:1px solid var(--border);border-radius:10px;padding:11px 16px;line-height:1.55}
  .serp-note b{color:var(--near-black);font-weight:800}
  .serp-paper{max-width:760px;margin:0 auto 18px;background:#fff;border:1px solid #e3ded7;border-radius:8px;box-shadow:0 4px 18px rgba(0,0,0,.06);padding:24px 28px 26px}
  .serp-paper.cur{opacity:.85}
  .serp-paper-lbl{font-size:10.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:13px;display:flex;align-items:center;gap:10px}
  .serp-paper-lbl .dot{width:8px;height:8px;border-radius:50%;display:inline-block}
  .serp-paper.cur .serp-paper-lbl .dot{background:#9a6313}
  .serp-paper.recA .serp-paper-lbl .dot{background:#34b864}
  .serp-paper.recB .serp-paper-lbl .dot{background:#7c3aed}
  .serp-result{font-family:'Arial',sans-serif}
  .serp-fav{display:flex;align-items:center;gap:11px;margin-bottom:3px}
  .serp-fav .favico{width:26px;height:26px;border-radius:50%;background:var(--near-black);color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Raleway';font-weight:800;font-size:13px}
  .serp-fav .site{font-family:'Arial',sans-serif;font-size:14px;color:#202124;line-height:1.2}
  .serp-fav .site .name{font-weight:500}
  .serp-fav .site .url{font-size:12px;color:#5f6368;margin-top:1px}
  .serp-title{font-family:'Arial',sans-serif;font-size:20px;line-height:1.3;color:#1a0dab;font-weight:400;margin:5px 0 3px;cursor:pointer}
  .serp-title:hover{text-decoration:underline}
  .serp-desc{font-family:'Arial',sans-serif;font-size:14px;line-height:1.58;color:#4d5156}
  .serp-trunc-hint{margin-top:8px;font-size:11px;color:#9a6313;font-style:italic}

  .summary-card{background:var(--off-white);border:1px solid var(--border);border-radius:16px;padding:24px 28px;margin-bottom:22px}
  .summary-card h3{font-size:14px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:14px}
  .stat-row{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:6px}
  .stat{flex:1;min-width:160px;background:var(--warm-cream);border:1px solid var(--border);border-radius:11px;padding:14px 18px}
  .stat .lbl{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle)}
  .stat .val{font-size:28px;font-weight:800;color:var(--near-black);margin-top:4px;line-height:1}
  .stat .sub{font-size:11.5px;color:var(--text-subtle);margin-top:4px}

  /* overview-only styles */
  .ov-section{background:var(--off-white);border:1px solid var(--border);border-radius:16px;padding:28px 32px 30px;margin-bottom:18px}
  .ov-section h2{font-size:13px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:18px;display:flex;align-items:center;gap:10px;padding-bottom:14px;border-bottom:1px solid var(--border)}
  .ov-section h2::before{content:'';width:10px;height:10px;border-radius:50%;background:var(--grad);display:inline-block;flex-shrink:0}
  .ov-section h3{font-size:14px;font-weight:800;color:var(--near-black);margin:22px 0 8px}
  .ov-section h3:first-of-type{margin-top:0}
  .ov-section p{font-size:14px;line-height:1.7;color:#2c2c2c;margin:0 0 14px}
  .ov-section ul,.ov-section ol{margin:0 0 14px;padding-left:22px}
  .ov-section li{font-size:14px;line-height:1.7;color:#2c2c2c;margin:6px 0}
  .ov-section li strong{font-weight:800;color:var(--near-black)}
  .ov-section .lead{font-size:15px;line-height:1.65;color:#2c2c2c;background:var(--warm-cream);border:1px solid var(--border);border-left:4px solid #7c3aed;border-radius:10px;padding:16px 20px;margin:0 0 22px}
  .ov-section .lead b{font-weight:800;color:var(--near-black)}

  .ov-process{counter-reset:step;list-style:none;padding:0;margin:0}
  .ov-process li{counter-increment:step;position:relative;padding:14px 16px 14px 56px;margin-bottom:10px;background:var(--warm-cream);border:1px solid var(--border);border-radius:11px;font-size:14px;line-height:1.65}
  .ov-process li::before{content:counter(step);position:absolute;left:14px;top:13px;width:30px;height:30px;border-radius:50%;background:var(--near-black);color:var(--mint);display:flex;align-items:center;justify-content:center;font-family:'Inter';font-weight:800;font-size:14px}
  .ov-process li b{font-weight:800;color:var(--near-black);display:block;margin-bottom:3px;font-size:14.5px}

  .ov-kwr-tbl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--border);border-radius:11px;overflow:hidden;font-size:13.5px;margin-bottom:6px}
  .ov-kwr-tbl th{background:var(--near-black);color:var(--mint);font-size:11px;letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:11px 14px;font-weight:800}
  .ov-kwr-tbl td{padding:11px 14px;border-top:1px solid var(--border);color:#2c2c2c}
  .ov-kwr-tbl td:first-child{font-weight:700}
  .ov-kwr-tbl tr:nth-child(even) td{background:var(--warm-cream)}
  .ov-kwr-tbl .mono{font-family:'JetBrains Mono';font-size:12.5px;background:var(--off-white);padding:2px 7px;border-radius:5px;border:1px solid var(--border)}

  .ov-callout{display:flex;gap:14px;padding:16px 18px;background:#fff8ee;border:1px solid #e89a2c;border-left-width:4px;border-radius:11px;font-size:13.5px;line-height:1.6;color:#5a4420;margin:10px 0 4px}
  .ov-callout b{color:#9a6313;font-weight:800}
  .ov-callout .ico{font-size:18px;flex-shrink:0;line-height:1.3}

  .ov-source-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
  .ov-source{background:var(--warm-cream);border:1px solid var(--border);border-radius:11px;padding:14px 16px}
  .ov-source .src-t{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:5px}
  .ov-source .src-n{font-size:13.5px;font-weight:700;color:var(--near-black);margin-bottom:5px}
  .ov-source .src-d{font-size:12.5px;color:#5a5a5a;line-height:1.55}

  .ov-pattern{background:var(--warm-cream);border:1px solid var(--border);border-radius:11px;padding:14px 18px;margin-bottom:14px}
  .ov-pattern .pt-l{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--text-subtle);margin-bottom:6px}
  .ov-pattern .pt-rule{font-family:'JetBrains Mono';font-size:13px;color:var(--near-black);background:var(--off-white);border:1px solid var(--border);border-radius:7px;padding:8px 12px;display:inline-block;margin-bottom:8px}
  .ov-pattern .pt-d{font-size:13px;color:#5a5a5a;line-height:1.6}

  .ov-ab{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .ov-ab-card{border-radius:12px;padding:16px 18px;border:1.5px solid}
  .ov-ab-card.a{background:#f0fbf3;border-color:#7dd396}
  .ov-ab-card.b{background:var(--lavender-lt);border-color:#c49aff}
  .ov-ab-card h4{font-size:13px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:8px}
  .ov-ab-card.a h4{color:#1a5c2a}
  .ov-ab-card.b h4{color:#4a1a7a}
  .ov-ab-card p{font-size:13.5px;line-height:1.6;color:#2c2c2c;margin:0}
  .ov-ab-card .badge{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:5px;letter-spacing:.04em}
  .ov-ab-card.a .badge{background:#34b864;color:#fff}
  .ov-ab-card.b .badge{background:#7c3aed;color:#fff}

  @media(max-width:640px){
    .ov-ab{grid-template-columns:1fr}
  }

  /* review bars (Approve / Request edits + comment) */
  .review{background:var(--lavender-lt);border:1px solid var(--peach-warm);border-radius:13px;padding:13px 16px;margin:14px 24px 18px}
  .review.is-approved{background:#f0fbf3;border-color:#8edda0}
  .review.is-rejected{background:#fff4e5;border-color:#e89a2c}
  .rv-row{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .rv-lbl{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#4a1a7a;margin-right:4px}
  .rv-btn{font-family:'Raleway';font-size:12.5px;font-weight:700;padding:6px 13px;border-radius:999px;border:1.5px solid var(--border);background:var(--off-white);color:var(--near-black);cursor:pointer}
  .rv-btn:hover{border-color:#c49aff}
  .rv-approve.on{background:var(--mint);border-color:#7dd396;color:#1a5c2a}
  .rv-reject.on{background:#fff4e5;border-color:#e89a2c;color:#9a6313}
  .rv-saved{font-size:11px;font-weight:700;color:#1a5c2a;opacity:0;transition:opacity .2s}
  .rv-saved.show{opacity:1}
  .rv-status{font-size:11px;font-weight:800;margin-left:auto}
  .rv-status[data-st="approve"]{color:#1a5c2a}
  .rv-status[data-st="reject"]{color:#9a6313}
  .rv-fb{width:100%;margin-top:10px;font-family:'Raleway';font-size:13px;padding:9px 12px;border:1px solid var(--border);border-radius:9px;background:var(--off-white);resize:vertical;min-height:38px;color:var(--near-black)}
  .rv-fb:focus{outline:none;border-color:#c49aff}

  /* review status pill in header */
  .ph-pill.rv{background:var(--mint);color:#1a5c2a}
  .ph-pill.rv.zero{background:rgba(255,255,255,.12);color:#cfcbc6}

  @media(max-width:860px){
    .sidebar{position:static;width:100%;height:auto;min-width:0}
    .main{margin-left:0}
    .page-header-inner,.tabbar,.main-pad{padding-left:24px;padding-right:24px}
  }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-brand">
      <div class="logo"><span class="dot"></span> Exa</div>
      <div class="sub">Title tag &amp; meta description recommendations<br>built by <b>daydream</b></div>
    </div>
    <div class="sb-group">
      <div class="sb-group-t"><span class="pdot"></span> Core pages</div>
      <div id="sbList"></div>
    </div>
    <div class="sb-foot">6 core pages · drafted around the suggested keyword themes pending Exa's approval.</div>
  </aside>

  <main class="main">
    <header class="page-header">
      <div class="page-header-inner">
        <div class="ph-top">
          <div style="flex:1">
            <div class="header-eyebrow">Exa.ai · Metadata optimization</div>
            <h1 class="page-title" id="hTitle"></h1>
            <div class="page-meta" id="hMeta"></div>
          </div>
        </div>
      </div>
    </header>
    <div class="tabbar" id="tabbar">
      <button class="tab active" data-tab="compare" id="tabCompare">Current vs Recommended</button>
      <button class="tab" data-tab="serp" id="tabSerp">SERP preview</button>
    </div>
    <div class="main-pad">
      <section class="panel active" data-panel="compare" id="panelCompare"></section>
      <section class="panel" data-panel="serp" id="panelSerp"></section>
    </div>
  </main>
</div>

/* helpers */
function $(s,r){return (r||document).querySelector(s);}
function $all(s,r){return Array.from((r||document).querySelectorAll(s));}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ccClass(len, lo, hi){
  if (len < lo) return 'bad';
  if (len > hi) return 'warn';
  return 'ok';
}
function ccTitle(len){ return ccClass(len, 30, 60); }
function ccDesc(len){ return ccClass(len, 120, 160); }

var current = 'home';

/* ── Supabase review state ─────────────────────────────────────── */
var SUPA_URL = 'https://hxehdymxabexhydpjzwn.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh4ZWhkeW14YWJleGh5ZHBqenduIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDU1ODYsImV4cCI6MjA5NjUyMTU4Nn0.vHqaCa1xFQTu1FYl_WlNt_AU0Y0lbZvkhB-covyGVmo';
var DELIVERABLE = 'exa-metadata';
var REVIEW_FIELDS = ['title','desc']; // two reviewable fields per page (single recommendation)
var BY_SLUG = {}; DATA.forEach(function(p){ BY_SLUG[p.slug] = p; });

var supa = null;
try { if (window.supabase) supa = window.supabase.createClient(SUPA_URL, SUPA_KEY); }
catch (e) { console.warn('supabase init failed', e); }

// STATE[slug] = { review: { titleA: {status,note}, ... } }
var STATE = {};
function stState(slug){ if (!STATE[slug]) STATE[slug] = { review: {} }; return STATE[slug]; }

async function loadAllReviews(){
  if (!supa) return;
  try {
    var r = await supa.from('keyword_reviews').select('theme_id,status,page_type').eq('deliverable', DELIVERABLE);
    (r.data || []).forEach(function(row){
      var parts = (row.theme_id || '').split('::');
      var slug = parts[0], id = parts[1];
      if (!slug || !id || !BY_SLUG[slug]) return;
      if (id.indexOf('rv-') === 0){
        stState(slug).review[id.slice(3)] = { status: row.status || '', note: row.page_type || '' };
      }
    });
  } catch (e) { console.warn('loadAllReviews', e); }
}

var REST = SUPA_URL + '/rest/v1/keyword_reviews?on_conflict=deliverable,theme_id';
var pending = {}, saveT = {};
function save(slug, field, status, note, debounce){
  var key = slug + '::rv-' + field;
  pending[key] = {
    deliverable: DELIVERABLE,
    theme_id: key,
    status: status,
    page_type: note || '',
    updated_at: new Date().toISOString()
  };
  clearTimeout(saveT[key]);
  saveT[key] = setTimeout(function(){ commit(key); }, debounce || 0);
}
function commit(key){
  if (!pending[key]) return;
  var body = pending[key];
  delete pending[key];
  try {
    fetch(REST, {
      method: 'POST',
      keepalive: true,
      headers: {
        'apikey': SUPA_KEY,
        'Authorization': 'Bearer ' + SUPA_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'resolution=merge-duplicates'
      },
      body: JSON.stringify(body)
    });
  } catch (e) { console.warn('commit', e); }
}

// Realtime: cross-tab + cross-user updates
try {
  if (supa) supa.channel('exa-' + DELIVERABLE)
    .on('postgres_changes', { event: '*', schema: 'public', table: 'keyword_reviews', filter: 'deliverable=eq.' + DELIVERABLE }, function(p){
      var row = p['new'] || p.old || {};
      var parts = (row.theme_id || '').split('::');
      var slug = parts[0], id = parts[1];
      if (!slug || !id || !BY_SLUG[slug] || id.indexOf('rv-') !== 0) return;
      var field = id.slice(3);
      stState(slug).review[field] = (p.eventType === 'DELETE')
        ? { status: '', note: '' }
        : { status: row.status || '', note: row.page_type || '' };
      if (slug === current) applyReviews();
      renderSidebar(); // update sidebar pills
    }).subscribe();
} catch (e) { console.warn('realtime', e); }

function reviewBarHTML(field, label){
  return '<div class="review" data-edit="'+field+'">'+
    '<div class="rv-row">'+
      '<span class="rv-lbl">'+esc(label)+'</span>'+
      '<button class="rv-btn rv-approve" data-s="approve">✓ Approve</button>'+
      '<button class="rv-btn rv-reject" data-s="reject">✎ Request edits</button>'+
      '<span class="rv-saved">saved ✓</span>'+
      '<span class="rv-status" data-st=""></span>'+
    '</div>'+
    '<textarea class="rv-fb" placeholder="Comment on this option (optional)…"></textarea>'+
  '</div>';
}
function wireReviewBars(root){
  $all('.review', root).forEach(function(bar){
    var field = bar.getAttribute('data-edit');
    $all('.rv-btn', bar).forEach(function(b){
      b.addEventListener('click', function(){
        var s = stState(current).review[field] || { status:'', note:'' };
        s.status = (s.status === b.dataset.s) ? '' : b.dataset.s;
        stState(current).review[field] = s;
        save(current, field, s.status, s.note || '');
        applyReviews();
        flash(bar);
      });
    });
    var fb = $('.rv-fb', bar);
    if (fb){
      fb.addEventListener('input', function(){
        var s = stState(current).review[field] || { status:'', note:'' };
        s.note = fb.value;
        stState(current).review[field] = s;
        save(current, field, s.status || '', fb.value, 400);
      });
      fb.addEventListener('blur', function(){
        var key = current + '::rv-' + field;
        clearTimeout(saveT[key]); commit(key); flash(bar);
      });
    }
  });
}
function flash(bar){
  var s = $('.rv-saved', bar);
  if (s){ s.classList.add('show'); setTimeout(function(){ s.classList.remove('show'); }, 1100); }
}
function applyReviews(){
  var rv = stState(current).review;
  $all('.review').forEach(function(bar){
    var field = bar.getAttribute('data-edit');
    var r = rv[field] || { status:'', note:'' };
    $all('.rv-btn', bar).forEach(function(b){ b.classList.toggle('on', b.dataset.s === r.status); });
    bar.classList.toggle('is-approved', r.status === 'approve');
    bar.classList.toggle('is-rejected', r.status === 'reject');
    var stt = $('.rv-status', bar);
    if (stt){
      stt.setAttribute('data-st', r.status);
      stt.textContent = r.status === 'approve' ? 'Approved' : (r.status === 'reject' ? 'Needs edits' : '');
    }
    var fb = $('.rv-fb', bar);
    if (fb && document.activeElement !== fb) fb.value = r.note || '';
  });
  updateReviewCount();
}
function updateReviewCount(){ /* rv count pill removed per Jack's feedback */ }

/* sidebar */
function renderSidebar(){
  var html = '';
  DATA.forEach(function(p){
    html += '<div class="sb-item'+(p.slug===current?' active':'')+'" data-slug="'+p.slug+'">'+
      '<span>'+esc(p.name)+'</span></div>';
  });
  $('#sbList').innerHTML = html;
  $all('.sb-item').forEach(function(el){
    el.addEventListener('click', function(){ go(el.dataset.slug); });
  });
}

/* header */
function renderHeader(p){
  $('#hTitle').textContent = p.name;
  var kdVol = '';
  if (p.kd != null || p.vol != null){
    var parts = [];
    if (p.kd != null) parts.push('KD ' + p.kd);
    if (p.vol != null) parts.push('vol ' + p.vol.toLocaleString());
    kdVol = ' <span style="color:#6f6a64">('+parts.join(' · ')+')</span>';
  }
  $('#hMeta').innerHTML =
    '<span>Primary keyword <strong>'+esc(p.primaryKw)+'</strong>'+kdVol+'</span>'+
    '<span>URL <strong>'+esc(p.url)+'</strong></span>';
}

      '</table>'+
    '</div>'+

    '<div class="meta-card">'+
      '<div class="meta-card-header"><span>◆ Current (live)</span><span class="mch-sub">what\'s on the page now</span></div>'+
      '<table class="meta-table">'+
        '<tr><td>Title tag</td><td><span class="opt-label opt-cur">CURRENT</span>'+esc(p.currentTitle)+'<span class="charcount '+ccTitle(ctl)+'">'+ctl+' chars</span></td></tr>'+
        '<tr><td>Meta description</td><td><span class="opt-label opt-cur">CURRENT</span>'+esc(p.currentDesc)+'<span class="charcount '+ccDesc(cdl)+'">'+cdl+' chars</span></td></tr>'+
      '</table>'+
    '</div>'+

    '<div class="meta-card">'+

        '<tr><td>Title tag</td><td><span class="opt-label opt-A">REC</span>'+esc(p.recTitle)+'<span class="charcount '+ccTitle(rTl)+'">'+rTl+' chars</span></td></tr>'+
      '</table>'+
      reviewBarHTML('title','Review Title')+
      '<table class="meta-table">'+
        '<tr><td>Meta description</td><td><span class="opt-label opt-A">REC</span>'+esc(p.recDesc)+'<span class="charcount '+ccDesc(rDl)+'">'+rDl+' chars</span></td></tr>'+
      '</table>'+
      reviewBarHTML('desc','Review Description')+
    '</div>';

  $('#panelCompare').innerHTML = html;
  wireReviewBars($('#panelCompare'));
  applyReviews();
}

/* SERP preview panel */
function serpResult(p, titleStr, descStr){
  var truncTitle = '';
  if (titleStr.length > 60) truncTitle = '<div class="serp-trunc-hint">⚠ Title is '+titleStr.length+' chars — Google will likely truncate around 60.</div>';
  var truncDesc = '';
  if (descStr.length > 160) truncDesc = '<div class="serp-trunc-hint">⚠ Description is '+descStr.length+' chars — Google may truncate around 160.</div>';
  var siteName = 'Exa';
  var initial = 'E';
  return ''+
    '<div class="serp-result">'+
      '<div class="serp-fav">'+
        '<div class="favico">'+initial+'</div>'+
        '<div class="site"><div class="name">'+siteName+'</div><div class="url">https://'+esc(p.url)+'</div></div>'+
      '</div>'+
      '<div class="serp-title">'+esc(titleStr)+'</div>'+
      '<div class="serp-desc">'+esc(descStr)+'</div>'+
      truncTitle + truncDesc +
    '</div>';
}

function renderSerp(p){
  var html = ''+
    '<div class="serp-stage">'+
      '<div class="serp-note">Mockup approximation of how the title + description renders in the Google SERP. Truncation warnings flag fields likely to get cut.</div>'+

      '<div class="serp-paper cur">'+
        '<div class="serp-paper-lbl"><span class="dot"></span> Current (live)</div>'+
        serpResult(p, p.currentTitle, p.currentDesc) +
      '</div>'+

      '<div class="serp-paper recA">'+
        '<div class="serp-paper-lbl"><span class="dot"></span> Recommended</div>'+
        serpResult(p, p.recTitle, p.recDesc) +
      '</div>'+
    '</div>';
  $('#panelSerp').innerHTML = html;
}

/* overview panel */
/* tabs */
function activateTab(name){
  $all('.tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === name); });
  $all('.panel').forEach(function(p){ p.classList.toggle('active', p.dataset.panel === name); });
}
$all('.tab').forEach(function(t){
  t.addEventListener('click', function(){ activateTab(t.dataset.tab); });
});

/* navigation */
function go(slug){
  current = slug;
  var p = DATA.find(function(x){ return x.slug === slug; });
  if (!p) return;
  renderSidebar();
  renderHeader(p);
  renderCompare(p);
  renderSerp(p);
  activateTab('compare');
  window.scrollTo(0,0);
}

// Boot: pull existing reviews, then render the overview
loadAllReviews().then(function(){ go('home'); }, function(){ go('home'); });
</script>
